<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Doom</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }
    </style>
</head>

<body>
<canvas id="canvas" tabindex="0"></canvas>

<script>
    const params = new URLSearchParams(location.search);
    const wad = params.get("wad") || "doom-ori.wad";

    window.Module = {
        arguments: ["-iwad", wad],
        canvas: document.getElementById("canvas"),
        locateFile: (p) => p,
        onRuntimeInitialized() {
            Module.canvas.focus();
        }
    };

    const canvas = document.getElementById("canvas");

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        if (Module?.setCanvasSize) {
            Module.setCanvasSize(canvas.width, canvas.height, false);
        }
    }

    window.addEventListener("resize", resize);

    window.Module = {
        canvas,
        locateFile: (p) => p,
        onRuntimeInitialized() {
            resize();
            canvas.focus();
        },
    };
</script>

<script src="doomgeneric.js"></script>
</body>
</html>
